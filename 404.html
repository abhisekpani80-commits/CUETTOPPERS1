<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003087">
  
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Page Not Found — CUET TEST</title>
  <link rel="stylesheet" href="base.css">
  <style>
    body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .err-box { background: #fff; border-radius: 12px; padding: 48px 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 480px; }
    .err-code { font-size: 72px; font-weight: 900; color: #003087; line-height: 1; }
    .err-msg { font-size: 20px; color: #555; margin: 12px 0 24px; }
    .btn-home { display: inline-block; background: #003087; color: #fff; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: 700; letter-spacing: 0.5px; }
    .btn-home:hover { background: #001f5c; }
  </style>
</head>
<body>
  <div class="tricolor-bar"></div>
  <div class="err-box">
    <div class="err-code">404</div>
    <div class="err-msg">Oops! Page not found.</div>
    <p style="color:#888;margin-bottom:24px">The page you're looking for doesn't exist or may have moved.</p>
    <a href="index.html" class="btn-home">🏠 Back to Login</a>
  </div>
</body>
</html>
